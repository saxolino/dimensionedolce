<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 20" fill="none">
  <!-- Left line -->
  <line
    x1="0"
    y1="10"
    x2="135"
    y2="10"
    stroke="#BBC25C"
    stroke-opacity="0.6"
    stroke-width="0.8"
    stroke-linecap="round"
  />
  <!-- Center diamond emblem -->
  <polygon
    points="150,2 158,10 150,18 142,10"
    stroke="#BBC25C"
    stroke-opacity="0.8"
    stroke-width="1"
    fill="none"
  />
  <polygon
    points="150,5 155,10 150,15 145,10"
    fill="#BBC25C"
    fill-opacity="0.3"
  />
  <!-- Right line -->
  <line
    x1="165"
    y1="10"
    x2="300"
    y2="10"
    stroke="#BBC25C"
    stroke-opacity="0.6"
    stroke-width="0.8"
    stroke-linecap="round"
  />
</svg>
