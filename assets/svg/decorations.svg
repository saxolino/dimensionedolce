  <!-- === ZIGZAG (zigzag.svg) === -->
  <g transform="translate(50, 230)">
    <text x="0" y="-5" font-family="serif" font-size="11" fill="#BBC25C" opacity="0.6">zigzag.svg</text>
    <g transform="scale(0.9)">
      <path d="M0 50 Q25 15,50 50 Q75 85,100 50 Q125 15,150 50 Q175 85,200 50 Q225 15,250 50 Q275 85,300 50" stroke="#BBC25C" stroke-opacity="0.6" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M0 55 Q25 25,50 55 Q75 85,100 55 Q125 25,150 55 Q175 85,200 55 Q225 25,250 55 Q275 85,300 55" stroke="#BBC25C" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round"/>
    </g>
  </g>

  <!-- === CIRCLES (circles.svg) === -->
  <g transform="translate(450, 30)">
    <text x="0" y="-5" font-family="serif" font-size="11" fill="#BBC25C" opacity="0.6">circles.svg</text>
    <g transform="scale(0.75)">
      <ellipse cx="100" cy="110" rx="70" ry="70" stroke="#BBC25C" stroke-opacity="0.4" stroke-width="1.2"/>
      <ellipse cx="155" cy="95" rx="55" ry="55" stroke="#BBC25C" stroke-opacity="0.25" stroke-width="1"/>
      <ellipse cx="120" cy="160" rx="45" ry="45" stroke="#BBC25C" stroke-opacity="0.5" stroke-width="1.5"/>
      <ellipse cx="80" cy="75" rx="30" ry="30" stroke="#BBC25C" stroke-opacity="0.15" stroke-width="0.8"/>
    </g>
  </g>

  <!-- === DIAGONAL LINE (diagonal-line.svg) === -->
  <g transform="translate(450, 260)">
    <text x="0" y="-5" font-family="serif" font-size="11" fill="#BBC25C" opacity="0.6">diagonal-line.svg</text>
    <g transform="scale(0.6)">
      <line x1="85" y1="10" x2="15" y2="190" stroke="#BBC25C" stroke-opacity="0.5" stroke-width="1" stroke-linecap="round"/>
      <line x1="88" y1="8" x2="18" y2="188" stroke="#BBC25C" stroke-opacity="0.15" stroke-width="0.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- === HORIZONTAL LINE (horizontal-line.svg) === -->
  <g transform="translate(50, 420)">
    <text x="0" y="-5" font-family="serif" font-size="11" fill="#BBC25C" opacity="0.6">horizontal-line.svg</text>
    <line x1="0" y1="10" x2="135" y2="10" stroke="#BBC25C" stroke-opacity="0.6" stroke-width="0.8" stroke-linecap="round"/>
    <polygon points="150,2 158,10 150,18 142,10" stroke="#BBC25C" stroke-opacity="0.8" stroke-width="1" fill="none"/>
    <polygon points="150,5 155,10 150,15 145,10" fill="#BBC25C" fill-opacity="0.3"/>
    <line x1="165" y1="10" x2="300" y2="10" stroke="#BBC25C" stroke-opacity="0.6" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- === SMALL ICONS ROW === -->
  <g transform="translate(50, 490)">
    <text x="0" y="-5" font-family="serif" font-size="11" fill="#BBC25C" opacity="0.6">scroll-arrow.svg / gift-icon.svg / phone-icon.svg / logo-emblem.svg</text>

    <!-- Scroll arrow -->
    <g transform="translate(0, 10)">
      <polyline points="6,6 20,18 34,6" stroke="#BBC25C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Gift icon -->
    <g transform="translate(80, 5)">
      <rect x="3" y="12" width="18" height="9" rx="1" stroke="#BBC25C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="2" y="8" width="20" height="4" rx="1" stroke="#BBC25C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="8" x2="12" y2="21" stroke="#BBC25C" stroke-width="1.5"/>
      <path d="M12 8C12 8 9 3 6 4C3 5 5 8 7 8" stroke="#BBC25C" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12 8C12 8 15 3 18 4C21 5 19 8 17 8" stroke="#BBC25C" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Phone icon -->
    <g transform="translate(150, 5)">
      <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z" stroke="#BBC25C" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Logo emblem -->
    <g transform="translate(220, -2)">
      <path d="M14 12 L14 48 L26 48 C38 48 44 40 44 30 C44 20 38 12 26 12 Z" stroke="#BBC25C" stroke-width="1.8" stroke-linejoin="round" fill="none" transform="scale(0.55)"/>
      <path d="M22 16 L22 44 L32 44 C42 44 47 37 47 30 C47 23 42 16 32 16 Z" stroke="#BBC25C" stroke-opacity="0.55" stroke-width="1.2" stroke-linejoin="round" fill="none" transform="scale(0.55)"/>
    </g>
  </g>
</svg>
